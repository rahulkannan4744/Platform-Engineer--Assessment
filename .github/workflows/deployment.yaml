name: Build and Push Images

on:
  push:


jobs:
deploy:
runs-on: ubuntu-latest

permissions:
  id-token: write
  contents: read

steps:
  - name: Checkout Source
    uses: actions/checkout@v4

  - name: Azure Login
    uses: azure/login@v2
    with:
      client-id: ${{ secrets.AZURE_CLIENT_ID }}
      tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  - name: Login to ACR
    run: |
      az acr login --name ${{ secrets.ACR_NAME }}

  - name: Build WorkApi Image
    run: |
      docker build \
        -f WorkApi/Dockerfile \
        -t ${{ secrets.ACR_NAME }}.azurecr.io/workapi:${{ github.sha }} .

  - name: Push WorkApi Image
    run: |
      docker push \
        ${{ secrets.ACR_NAME }}.azurecr.io/workapi:${{ github.sha }}

  - name: Build WorkerService Image
    run: |
      docker build \
        -f WorkerService/Dockerfile \
        -t ${{ secrets.ACR_NAME }}.azurecr.io/workerservice:${{ github.sha }} .

  - name: Push WorkerService Image
    run: |
      docker push \
        ${{ secrets.ACR_NAME }}.azurecr.io/workerservice:${{ github.sha }}
