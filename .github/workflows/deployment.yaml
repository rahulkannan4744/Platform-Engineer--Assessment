name: Build and Push Image

on:
  push:
   

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:        
      contents: read 
    environment :
      name: dev
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Solution
        run: dotnet build --configuration Release --no-restore

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build WorkApi Image
        run: |
          docker build \
            -f WorkApi/Dockerfile \
            -t $ACR_NAME.azurecr.io/workapi:$IMAGE_TAG .

      - name: Push WorkApi Image
        run: |
          docker push \
            $ACR_NAME.azurecr.io/workapi:$IMAGE_TAG

      - name: Build WorkerService Image
        run: |
          docker build \
            -f WorkerService/Dockerfile \
            -t $ACR_NAME.azurecr.io/workerservice:$IMAGE_TAG .

      - name: Push WorkerService Image
        run: |
          docker push \
            $ACR_NAME.azurecr.io/workerservice:$IMAGE_TAG
